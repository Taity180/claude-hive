<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Hub icon: central circle with radiating connection lines -->
  <!-- Center circle -->
  <circle cx="256" cy="256" r="48" fill="white" opacity="0.95"/>
  <!-- Connection dots (sessions) -->
  <circle cx="256" cy="112" r="28" fill="white" opacity="0.8"/>
  <circle cx="380" cy="196" r="28" fill="white" opacity="0.8"/>
  <circle cx="380" cy="316" r="28" fill="white" opacity="0.8"/>
  <circle cx="256" cy="400" r="28" fill="white" opacity="0.8"/>
  <circle cx="132" cy="316" r="28" fill="white" opacity="0.8"/>
  <circle cx="132" cy="196" r="28" fill="white" opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="256" y1="208" x2="256" y2="140" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="296" y1="228" x2="354" y2="200" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="296" y1="284" x2="354" y2="312" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="256" y1="304" x2="256" y2="372" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="216" y1="284" x2="158" y2="312" stroke="white" stroke-width="6" opacity="0.4"/>
  <line x1="216" y1="228" x2="158" y2="200" stroke="white" stroke-width="6" opacity="0.4"/>
  <!-- Pulse ring on one dot (attention indicator) -->
  <circle cx="380" cy="196" r="36" fill="none" stroke="#fbbf24" stroke-width="4" opacity="0.6"/>
</svg>
